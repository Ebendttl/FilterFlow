<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <!-- ╔══════════════════════════════════════════════════════════╗
         ║  Anti-FOUT: Apply theme tokens SYNCHRONOUSLY before     ║
         ║  React renders — prevents white flash on dark mode load  ║
         ╚══════════════════════════════════════════════════════════╝ -->
    <script>
      (function () {
        var THEMES = {
          obsidian: {
            '--bg-base':'#09090b','--bg-elevated':'#111113','--bg-card':'#18181b',
            '--bg-hover':'#27272a','--bg-border':'#3f3f46',
            '--text-primary':'#fafafa','--text-secondary':'#a1a1aa','--text-muted':'#71717a',
            '--accent':'#8b5cf6','--accent-cyan':'#06b6d4'
          },
          arctic: {
            '--bg-base':'#f8fafc','--bg-elevated':'#ffffff','--bg-card':'#f1f5f9',
            '--bg-hover':'#e2e8f0','--bg-border':'#cbd5e1',
            '--text-primary':'#0f172a','--text-secondary':'#475569','--text-muted':'#94a3b8',
            '--accent':'#6366f1','--accent-cyan':'#0891b2'
          }
        };
        try {
          var saved = localStorage.getItem('ff-theme');
          var key = (saved && THEMES[saved]) ? saved :
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'obsidian' : 'arctic');
          var vars = THEMES[key];
          var root = document.documentElement;
          for (var k in vars) root.style.setProperty(k, vars[k]);
          root.setAttribute('data-theme', key);
          if (key === 'obsidian') root.classList.add('dark');
        } catch (e) {}
      })();
    </script>
