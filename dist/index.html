<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('ff-theme');
          var themes = {
            obsidian: { '--bg-base': '#09090b', '--bg-elevated': '#111113',
                        '--bg-card': '#18181b', '--bg-hover': '#27272a',
                        '--bg-border': '#3f3f46', '--text-primary': '#fafafa',
                        '--text-secondary': '#a1a1aa', '--text-muted': '#71717a',
                        '--accent': '#8b5cf6', '--accent-cyan': '#06b6d4' },
            arctic:   { '--bg-base': '#ffffff', '--bg-elevated': '#f8fafc',
                        '--bg-card': '#f1f5f9', '--bg-hover': '#e2e8f0',
                        '--bg-border': '#cbd5e1', '--text-primary': '#0f172a',
                        '--text-secondary': '#475569', '--text-muted': '#94a3b8',
                        '--accent': '#6366f1', '--accent-cyan': '#0891b2' },
            midnight: { '--bg-base': '#0d1117', '--bg-elevated': '#161b22',
                        '--bg-card': '#1c2128', '--bg-hover': '#262c36',
                        '--bg-border': '#30363d', '--text-primary': '#e6edf3',
                        '--text-secondary': '#8b949e', '--text-muted': '#6e7681',
                        '--accent': '#58a6ff', '--accent-cyan': '#39d353' },
            ember:    { '--bg-base': '#0c0a09', '--bg-elevated': '#1c1917',
                        '--bg-card': '#292524', '--bg-hover': '#3c3836',
                        '--bg-border': '#57534e', '--text-primary': '#fafaf9',
                        '--text-secondary': '#a8a29e', '--text-muted': '#78716c',
                        '--accent': '#f97316', '--accent-cyan': '#fb923c' }
          };
          var key = saved || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches 
              ? 'obsidian' : 'arctic');
          if (key === 'system') {
            key = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'obsidian' : 'arctic';
          }
          var vars = themes[key] || themes.obsidian;
          var root = document.documentElement;
          Object.keys(vars).forEach(function(k){ 
            root.style.setProperty(k, vars[k]); 
          });
          root.setAttribute('data-theme', key);
          if (['obsidian','midnight','ember'].includes(key)) {
            root.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
